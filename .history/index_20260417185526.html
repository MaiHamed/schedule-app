<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedule Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    .grid-cell { height: 60px; }
    .grid-cell:hover { filter: brightness(1.1); }
  </style>
</head>
<body class="h-full bg-gray-950 text-white">
  <div class="max-w-7xl mx-auto p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold">📅 My Schedule</h1>
      
      <div class="flex items-center gap-4">
        <!-- Semester -->
        <div>
          <label class="text-sm block mb-1">Semester</label>
          <select id="semesterSelect" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white"></select>
        </div>
        <button onclick="addSemester()" class="bg-emerald-600 hover:bg-emerald-700 px-5 py-2 rounded-xl font-medium">+ Add Semester</button>

        <!-- Week start -->
        <div>
          <label class="text-sm block mb-1">Week starts on</label>
          <select id="startDaySelect" onchange="renderGrid()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-white">
            <option value="Monday">Monday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
          </select>
        </div>

        <button onclick="downloadTable()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl font-medium flex items-center gap-2">
          📤 Download Table
        </button>
      </div>
    </div>

    <div class="flex gap-6">
      <!-- Left Sidebar: Courses -->
      <div class="w-72 bg-gray-900 rounded-3xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-semibold">Courses</h2>
          <button onclick="showAddCourseModal()" class="bg-violet-600 hover:bg-violet-700 px-4 py-1 rounded-2xl text-sm font-medium">+ Add Course</button>
        </div>
        <div id="courseList" class="space-y-3"></div>
      </div>

      <!-- Main Grid -->
      <div class="flex-1 bg-gray-900 rounded-3xl p-6">
        <div class="flex justify-between mb-4">
          <h2 class="text-2xl font-semibold" id="currentDraftName">Untitled Draft</h2>
          <div class="flex gap-3">
            <button onclick="newDraft()" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl">New Draft</button>
            <button onclick="saveDraft()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl">💾 Save Draft</button>
            <button onclick="showDraftsModal()" class="px-5 py-2 bg-amber-600 hover:bg-amber-700 rounded-2xl">📂 My Drafts</button>
          </div>
        </div>

        <div id="scheduleGrid" class="overflow-auto border border-gray-700 rounded-2xl bg-gray-950"></div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <!-- Add Course Modal -->
  <div id="addCourseModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-96">
      <h3 class="text-2xl mb-6">Add New Course</h3>
      <input id="courseName" placeholder="Course Name" class="w-full mb-4 bg-gray-800 rounded-2xl px-5 py-4 outline-none">
      <input id="courseCode" placeholder="Code (e.g. CS101)" class="w-full mb-4 bg-gray-800 rounded-2xl px-5 py-4 outline-none">
      <div class="flex items-center gap-3 mb-8">
        <span class="text-sm">Color</span>
        <input id="courseColor" type="color" value="#3b82f6" class="w-12 h-10 bg-transparent border-0 p-0">
      </div>
      <div class="flex gap-4">
        <button onclick="hideAddCourseModal()" class="flex-1 py-4 rounded-2xl border border-gray-700">Cancel</button>
        <button onclick="addCourse()" class="flex-1 py-4 bg-violet-600 rounded-2xl">Add Course</button>
      </div>
    </div>
  </div>

  <!-- Add Event Modal -->
  <div id="addEventModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-96">
      <h3 class="text-2xl mb-6">Add to schedule</h3>
      <select id="eventCourseSelect" class="w-full mb-4 bg-gray-800 rounded-2xl px-5 py-4 outline-none"></select>
      <select id="eventType" class="w-full mb-8 bg-gray-800 rounded-2xl px-5 py-4 outline-none">
        <option value="Lecture">Lecture</option>
        <option value="Lab">Lab</option>
        <option value="Tutorial">Tutorial</option>
        <option value="Extra">Extra</option>
      </select>
      <div class="flex gap-4">
        <button onclick="hideAddEventModal()" class="flex-1 py-4 rounded-2xl border border-gray-700">Cancel</button>
        <button onclick="addEventToGrid()" class="flex-1 py-4 bg-emerald-600 rounded-2xl">Add to Grid</button>
      </div>
    </div>
  </div>

  <!-- Drafts Modal -->
  <div id="draftsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-[500px]">
      <h3 class="text-2xl mb-6">Saved Drafts</h3>
      <div id="draftsList" class="max-h-96 overflow-auto space-y-2"></div>
      <button onclick="hideDraftsModal()" class="mt-6 w-full py-4 border border-gray-700 rounded-2xl">Close</button>
    </div>
  </div>

  <script>
    // Data structure
    let semesters = JSON.parse(localStorage.getItem('scheduleSemesters')) || [{
      id: 1,
      name: "Spring 2026",
      courses: [],
      drafts: [{ id: 1, name: "Main Draft", events: [] }]
    }]
    let currentSemesterId = 1
    let currentDraftId = 1
    let currentEvents = [] // events of the loaded draft
    let selectedCell = null // {row, col, dayName, time}

    const weekDaysFull = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
    let startDay = "Monday"

    const timeSlots = ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00"]

    // Helper to get current semester object
    function getCurrentSemester() {
      return semesters.find(s => s.id === currentSemesterId)
    }

    function saveToLocal() {
      localStorage.setItem('scheduleSemesters', JSON.stringify(semesters))
    }

    // Render semester dropdown
    function renderSemesterSelect() {
      const select = document.getElementById('semesterSelect')
      select.innerHTML = ''
      semesters.forEach(sem => {
        const opt = document.createElement('option')
        opt.value = sem.id
        opt.textContent = sem.name
        if (sem.id === currentSemesterId) opt.selected = true
        select.appendChild(opt)
      })
      select.onchange = () => {
        currentSemesterId = parseInt(select.value)
        loadDraft(1) // load first draft of new semester
        renderCourses()
        renderGrid()
      }
    }

    // Add new semester
    function addSemester() {
      const name = prompt("Semester name (e.g. Fall 2026)", "Fall 2026")
      if (!name) return
      const newSem = {
        id: Date.now(),
        name: name,
        courses: [],
        drafts: [{ id: 1, name: "Main Draft", events: [] }]
      }
      semesters.push(newSem)
      currentSemesterId = newSem.id
      saveToLocal()
      renderSemesterSelect()
      renderCourses()
      renderGrid()
    }

    // Courses
    function renderCourses() {
      const container = document.getElementById('courseList')
      container.innerHTML = ''
      const sem = getCurrentSemester()
      sem.courses.forEach(course => {
        const div = document.createElement('div')
        div.className = "flex items-center gap-3 bg-gray-800 rounded-2xl px-4 py-3"
        div.innerHTML = `
          <div class="w-6 h-6 rounded-xl" style="background-color: ${course.color}"></div>
          <div>
            <div class="font-medium">${course.name}</div>
            <div class="text-xs text-gray-400">${course.code}</div>
          </div>
        `
        container.appendChild(div)
      })
      if (sem.courses.length === 0) {
        container.innerHTML = `<p class="text-gray-400 text-center py-8">No courses yet.<br>Click + Add Course</p>`
      }
    }

    function showAddCourseModal() {
      document.getElementById('addCourseModal').classList.remove('hidden')
      document.getElementById('courseName').focus()
    }

    function hideAddCourseModal() {
      document.getElementById('addCourseModal').classList.add('hidden')
    }

    function addCourse() {
      const name = document.getElementById('courseName').value.trim()
      const code = document.getElementById('courseCode').value.trim() || "COURSE"
      const color = document.getElementById('courseColor').value
      if (!name) return alert("Course name required")

      const sem = getCurrentSemester()
      sem.courses.push({
        id: Date.now(),
        name,
        code: code.toUpperCase(),
        color
      })
      saveToLocal()
      renderCourses()
      hideAddCourseModal()
      // clear inputs
      document.getElementById('courseName').value = ''
      document.getElementById('courseCode').value = ''
    }

    // Grid rendering
    function getDisplayedDays() {
      const idx = weekDaysFull.indexOf(startDay)
      return weekDaysFull.slice(idx).concat(weekDaysFull.slice(0, idx))
    }

    function renderGrid() {
      startDay = document.getElementById('startDaySelect').value
      const days = getDisplayedDays()
      const sem = getCurrentSemester()
      const container = document.getElementById('scheduleGrid')

      let html = `<table class="w-full border-collapse text-sm">`
      // Header
      html += `<thead><tr><th class="p-3 bg-gray-800 border-b border-gray-700"></th>`
      days.forEach(day => {
        html += `<th class="p-3 bg-gray-800 border-b border-gray-700 text-center font-medium">${day}</th>`
      })
      html += `</tr></thead><tbody>`

      timeSlots.forEach((time, row) => {
        html += `<tr>`
        html += `<td class="p-3 bg-gray-800 border-r border-gray-700 text-right font-medium">${time}</td>`
        days.forEach((day, col) => {
          const event = currentEvents.find(e => e.day === day && e.time === time)
          if (event) {
            const course = sem.courses.find(c => c.id === event.courseId)
            html += `
              <td onclick="handleCellClick(${row},${col},'${day}','${time}')" 
                  class="grid-cell border border-gray-700 text-center cursor-pointer relative overflow-hidden"
                  style="background-color: ${course ? course.color + '33' : ''}">
                <div class="text-xs font-bold">${course ? course.code : ''}</div>
                <div class="text-[10px] opacity-75">${event.type}</div>
              </td>`
          } else {
            html += `
              <td onclick="handleCellClick(${row},${col},'${day}','${time}')" 
                  class="grid-cell border border-gray-700 hover:bg-gray-800 text-center text-transparent hover:text-gray-400 cursor-pointer">
                +
              </td>`
          }
        })
        html += `</tr>`
      })
      html += `</tbody></table>`
      container.innerHTML = html
    }

    function handleCellClick(row, col, day, time) {
      const sem = getCurrentSemester()
      const existing = currentEvents.find(e => e.day === day && e.time === time)
      selectedCell = { row, col, day, time }

      if (existing) {
        if (confirm(`Remove this class?\n${existing.type} at ${day} ${time}`)) {
          currentEvents = currentEvents.filter(e => !(e.day === day && e.time === time))
          renderGrid()
        }
      } else {
        // show add modal
        const select = document.getElementById('eventCourseSelect')
        select.innerHTML = ''
        sem.courses.forEach(c => {
          const opt = document.createElement('option')
          opt.value = c.id
          opt.textContent = `${c.code} - ${c.name}`
          select.appendChild(opt)
        })
        document.getElementById('addEventModal').classList.remove('hidden')
      }
    }

    function hideAddEventModal() {
      document.getElementById('addEventModal').classList.add('hidden')
      selectedCell = null
    }

    function addEventToGrid() {
      if (!selectedCell) return
      const courseId = parseInt(document.getElementById('eventCourseSelect').value)
      const type = document.getElementById('eventType').value

      currentEvents.push({
        id: Date.now(),
        courseId,
        day: selectedCell.day,
        time: selectedCell.time,
        type: type
      })

      hideAddEventModal()
      renderGrid()
    }

    // Drafts
    function loadDraft(draftId) {
      const sem = getCurrentSemester()
      const draft = sem.drafts.find(d => d.id === draftId)
      if (draft) {
        currentDraftId = draftId
        currentEvents = JSON.parse(JSON.stringify(draft.events)) // deep copy
        document.getElementById('currentDraftName').textContent = draft.name
        renderGrid()
      }
    }

    function saveDraft() {
      const sem = getCurrentSemester()
      const draft = sem.drafts.find(d => d.id === currentDraftId)
      if (draft) {
        draft.events = JSON.parse(JSON.stringify(currentEvents))
        saveToLocal()
        alert("✅ Draft saved!")
      }
    }

    function newDraft() {
      const name = prompt("New draft name:", "Draft " + (getCurrentSemester().drafts.length + 1))
      if (!name) return
      const sem = getCurrentSemester()
      const newDraft = {
        id: Date.now(),
        name: name,
        events: []
      }
      sem.drafts.push(newDraft)
      currentDraftId = newDraft.id
      currentEvents = []
      document.getElementById('currentDraftName').textContent = name
      saveToLocal()
      renderGrid()
    }

    function showDraftsModal() {
      const sem = getCurrentSemester()
      const container = document.getElementById('draftsList')
      container.innerHTML = ''
      sem.drafts.forEach(draft => {
        const active = draft.id === currentDraftId ? 'ring-2 ring-emerald-500' : ''
        const div = document.createElement('div')
        div.className = `flex justify-between items-center p-4 bg-gray-800 rounded-2xl ${active}`
        div.innerHTML = `
          <div>
            <div class="font-medium">${draft.name}</div>
            <div class="text-xs text-gray-400">${draft.events.length} classes</div>
          </div>
          <div class="flex gap-2">
            <button onclick="loadDraft(${draft.id});hideDraftsModal()" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-2xl text-sm">Load</button>
            <button onclick="if(confirm('Delete draft?')){deleteDraft(${draft.id});hideDraftsModal()}" class="px-4 py-2 text-red-400 hover:bg-red-950 rounded-2xl text-sm">🗑</button>
          </div>
        `
        container.appendChild(div)
      })
      document.getElementById('draftsModal').classList.remove('hidden')
    }

    function hideDraftsModal() {
      document.getElementById('draftsModal').classList.add('hidden')
    }

    function deleteDraft(id) {
      const sem = getCurrentSemester()
      sem.drafts = sem.drafts.filter(d => d.id !== id)
      if (currentDraftId === id) {
        currentDraftId = sem.drafts[0].id
        loadDraft(currentDraftId)
      }
      saveToLocal()
    }

    // Download as PNG
    function downloadTable() {
      const grid = document.getElementById('scheduleGrid')
      html2canvas(grid, {scale: 2}).then(canvas => {
        const link = document.createElement('a')
        link.download = `schedule-${getCurrentSemester().name}.png`
        link.href = canvas.toDataURL('image/png')
        link.click()
      })
    }

    // Init everything
    function init() {
      renderSemesterSelect()
      const sem = getCurrentSemester()
      if (sem.drafts.length === 0) sem.drafts = [{id:1, name:"Main Draft", events:[]}]
      loadDraft(sem.drafts[0].id)
      renderCourses()
      renderGrid()

      // Tailwind script already loaded
      console.log('%c✅ Schedule builder ready! Start adding courses and clicking the grid 🎉', 'color:#10b981; font-size:13px')
    }

    window.onload = init
  </script>
</body>
</html>
